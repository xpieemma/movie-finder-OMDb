name: movie-finder-api
region: was
services:
  - name: api
    type: web
    instance_type: nano
    autoscaling:
      min: 1
      max: 1
    git:
      repository: https://github.com/yourusername/movie-finder-api
      branch: main
      build_command: npm run build
      run_command: node dist/server.js
    ports:
      - port: 3001
        protocol: http
    health_check:
      path: /health
      initial_delay: 5
      period: 30
      timeout: 3
      success_threshold: 1
      failure_threshold: 3
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: OMDB_API_KEY
        secret: OMDB_API_KEY
      - key: ALLOWED_ORIGINS
        value: "https://movie-finder.vercel.app,https://your-custom-domain.com"
      - key: LOG_LEVEL
        value: info