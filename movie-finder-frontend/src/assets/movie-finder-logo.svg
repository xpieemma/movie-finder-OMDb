  <rect x="67" y="43" width="3" height="3" fill="#2F4F4F" />
  <rect x="72" y="43" width="3" height="3" fill="#2F4F4F" />
  <rect x="67" y="48" width="3" height="3" fill="#2F4F4F" />
  <rect x="72" y="48" width="3" height="3" fill="#2F4F4F" />
  <rect x="67" y="53" width="3" height="3" fill="#2F4F4F" />
  <rect x="72" y="53" width="3" height="3" fill="#2F4F4F" />
</svg>