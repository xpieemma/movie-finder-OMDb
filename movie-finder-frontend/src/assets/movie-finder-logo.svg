<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="45" fill="whitesmoke" />
  
  <!-- Camera body (brown) -->
  <rect x="25" y="35" width="40" height="30" rx="6" fill="#8B4513" />
  <rect x="30" y="30" width="30" height="10" rx="4" fill="#CD853F" />
  
  <!-- Lens -->
  <circle cx="50" cy="50" r="12" fill="#2F4F4F" />
